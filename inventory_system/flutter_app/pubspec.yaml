name: inventory_management
description: Private Inventory Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  mobile_scanner: ^3.5.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.2
  go_router: ^13.2.0
  intl: ^0.19.0
  open_filex: ^4.3.4
  flutter_local_notifications: ^17.0.0
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
